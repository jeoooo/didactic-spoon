services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_screener
    ports:
      - "5432:5432"
    volumes:
      - resume_screener_db_data:/var/lib/postgresql/data

volumes:
  resume_screener_db_data:
